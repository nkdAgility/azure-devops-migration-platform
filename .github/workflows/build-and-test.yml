name: Build and Test

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  build-and-test:
    name: Build and Test
    # net481 targets require Windows
    runs-on: windows-latest
    permissions:
      checks: write
      contents: read
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore dependencies
        run: dotnet restore DevOpsMigrationPlatform.slnx

      - name: Build
        run: dotnet build DevOpsMigrationPlatform.slnx --no-restore --configuration Release -warnaserror:false

      - name: Test
        run: |
          dotnet test DevOpsMigrationPlatform.slnx --no-build --configuration Release `
            --logger "trx" `
            --logger "console;verbosity=normal" `
            --results-directory TestResults

      - name: Upload test artefacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: TestResults/**/*.trx

      - name: Publish test results
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: Test Results
          path: TestResults/**/*.trx
          reporter: dotnet-trx
    