name: CI/CD Build

on:
  pull_request:
    branches: ["main"]
  push:
    branches: ["main"]
    tags: ["v*"]
  release:
    types: [published]

jobs:
  build:
    name: Build, Test, and Package
    # net481 targets require Windows; build.ps1 is the single entry point
    runs-on: windows-latest
    permissions:
      checks: write
      contents: read
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Install GitVersion
        uses: gittools/actions/gitversion/setup@v3
        with:
          versionSpec: "6.1.0"

      - name: Build, Test, and Package
        run: pwsh ./build.ps1

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: TestResults/**/*.trx

      - name: Publish test results
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: Test Results
          path: TestResults/**/*.trx
          reporter: dotnet-trx

      - name: Upload CLI artefact
        uses: actions/upload-artifact@v4
        with:
          name: cli-package
          path: artifacts/MigrationTools-*.zip

      - name: Upload Control Plane artefact
        uses: actions/upload-artifact@v4
        with:
          name: controlplane-package
          path: artifacts/ControlPlane-*.zip

      - name: Upload Agent artefact
        uses: actions/upload-artifact@v4
        with:
          name: agent-package
          path: artifacts/Agent-*.zip
    