assembly-versioning-scheme: MajorMinorPatch
mode: ContinuousDelivery
label: 'canary'
next-version: 20.0.0
branches:
  main:
    regex: ^master$|^main$
    mode: ContinuousDelivery
    label: 'preview'
    increment: Patch
  release:
    regex: ^release(s)?[\/-]
    mode: ContinuousDelivery
    label: ''
    increment: Patch
    track-merge-target: false
    source-branches:
    - main
    is-release-branch: true  
  unknown:
    mode: ContinuousDelivery
    label: '{BranchName}'
    increment: Inherit