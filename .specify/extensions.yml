installed: []
settings:
  auto_execute_hooks: true
hooks:
  after_specify:
  - extension: nkda-archimprove-red-team-review
    command: nkda-archimprove-red-team-review
    enabled: true
    optional: false
    description: Challenge the specification with adversarial thinking to surface
      blind spots, wrong assumptions, and missing failure modes
    condition: null
  - extension: nkda-observability-contract
    command: nkda-observability-contract --stage spec
    enabled: true
    optional: false
    description: Inspect, validate, and amend the specification to ensure complete
      decision-driven observability coverage across metrics, traces, and logs
    condition: null
  - extension: connector-coverage-check
    command: connector-coverage-check --stage spec
    enabled: true
    optional: false
    description: Inspect, validate, and amend the specification to ensure full implementation
      coverage across all three connectors (Simulated, AzureDevOps, TFS)
    condition: null
  - extension: git
    command: speckit.git.commit
    enabled: true
    optional: true
    prompt: Commit specification changes?
    description: Auto-commit after specification
    condition: null
  after_plan:
  - extension: nkda-observability-contract
    command: nkda-observability-contract --stage plan
    enabled: true
    optional: false
    description: Validate and amend plan.md to ensure the Observability Contract section
      specifies complete, decision-driven observability coverage (O-1 traces, O-2
      metrics, O-3 logs, O-4 progress events, CLI visibility) across metrics, traces,
      and logs for every operation
    condition: null
  - extension: nkda-core-plan-architecture-compliance
    command: nkda-core-plan-architecture-compliance
    enabled: true
    optional: false
    description: Design-time compliance review — validates spec.md and plan.md against
      all five architecture perspectives plus constitution and guardrails before task
      generation begins
    condition: null
  - extension: git
    command: speckit.git.commit
    enabled: true
    optional: true
    prompt: Commit plan changes?
    description: Auto-commit after implementation planning
    condition: null
  after_tasks:
  - extension: nkda-observability-contract
    command: nkda-observability-contract --stage tasks
    enabled: true
    optional: false
    description: Validate and amend tasks.md to ensure every user story phase contains
      explicit O-1, O-2, O-3, and O-4 observability tasks
    condition: null
  - extension: superb
    command: speckit.superb.review
    enabled: true
    optional: false
    prompt: Review tasks.md for coverage and TDD-readiness before implementation?
    description: 'Catches missing or under-specified tasks at planning time. Produces
      a requirement coverage and TDD-readiness report. Bridge-native logic.

      '
    condition: null
  - extension: git
    command: speckit.git.commit
    enabled: true
    optional: true
    prompt: Commit task changes?
    description: Auto-commit after task generation
    condition: null
  after_implement:
  - extension: update-docs
    command: update-docs
    enabled: true
    optional: false
    description: Scan every changed file and update every affected canonical doc in
      /docs and /.agents/context — CLI commands, configuration keys, modules, connectors,
      architecture. Mark all doc-tasks in tasks.md as complete.
    condition: null
  - extension: nkda-observability-contract
    command: nkda-observability-contract --stage implement
    enabled: true
    optional: false
    description: Scan every modified .cs file for O-1 spans, O-2 metrics, O-3 structured
      logging, and O-4 progress events — implement any missing instrumentation before
      proceeding
    condition: null
  - extension: nkda-archimprove-test-validity
    command: nkda-archimprove-test-validity
    enabled: true
    optional: false
    description: Score every test for intrinsic value and delete WASTE tests before
      promotion analysis
    condition: null
  - extension: nkda-archimprove-test-promotion
    command: nkda-archimprove-test-promotion
    enabled: true
    optional: false
    description: Analyse tests touched by implementation — promote to faster categories
      and retire redundant slower tests
    condition: null
  - extension: nkda-core-definition-of-done
    command: nkda-core-definition-of-done
    enabled: true
    optional: false
    description: Validate that the completed work meets every criterion in the Definition
      of Done — build, tests, code quality, connector coverage, documentation, and
      compliance review
    condition: null
  - extension: superb
    command: speckit.superb.verify
    enabled: true
    optional: false
    prompt: Execute speckit.superb.verify?
    description: 'Mandatory completion gate. Bridges an installed superpowers verification-before-completion
      skill and extends it with spec-kit spec-coverage checks. Prevents false completions.

      '
    condition: null
  - extension: git
    command: speckit.git.commit
    enabled: true
    optional: true
    prompt: Commit implementation changes?
    description: Auto-commit after implementation
    condition: null
  before_implement:
  - extension: superb
    command: speckit.superb.tdd
    enabled: true
    optional: false
    prompt: Execute speckit.superb.tdd?
    description: 'Mandatory TDD gate. Bridges an installed superpowers test-driven-development
      skill into the spec-kit task structure before any code is written.

      '
    condition: null
  - extension: git
    command: speckit.git.commit
    enabled: true
    optional: true
    prompt: Commit outstanding changes before implementation?
    description: Auto-commit before implementation
    condition: null
  before_constitution:
  - extension: git
    command: speckit.git.initialize
    enabled: true
    optional: false
    prompt: Execute speckit.git.initialize?
    description: Initialize Git repository before constitution setup
    condition: null
  before_specify:
  - extension: git
    command: speckit.git.feature
    enabled: true
    optional: false
    prompt: Execute speckit.git.feature?
    description: Create feature branch before specification
    condition: null
  before_clarify:
  - extension: git
    command: speckit.git.commit
    enabled: true
    optional: true
    prompt: Commit outstanding changes before clarification?
    description: Auto-commit before spec clarification
    condition: null
  before_plan:
  - extension: git
    command: speckit.git.commit
    enabled: true
    optional: true
    prompt: Commit outstanding changes before planning?
    description: Auto-commit before implementation planning
    condition: null
  before_tasks:
  - extension: git
    command: speckit.git.commit
    enabled: true
    optional: true
    prompt: Commit outstanding changes before task generation?
    description: Auto-commit before task generation
    condition: null
  before_checklist:
  - extension: git
    command: speckit.git.commit
    enabled: true
    optional: true
    prompt: Commit outstanding changes before checklist?
    description: Auto-commit before checklist generation
    condition: null
  before_analyze:
  - extension: git
    command: speckit.git.commit
    enabled: true
    optional: true
    prompt: Commit outstanding changes before analysis?
    description: Auto-commit before analysis
    condition: null
  before_taskstoissues:
  - extension: git
    command: speckit.git.commit
    enabled: true
    optional: true
    prompt: Commit outstanding changes before issue sync?
    description: Auto-commit before tasks-to-issues conversion
    condition: null
  after_constitution:
  - extension: git
    command: speckit.git.commit
    enabled: true
    optional: true
    prompt: Commit constitution changes?
    description: Auto-commit after constitution update
    condition: null
  after_clarify:
  - extension: git
    command: speckit.git.commit
    enabled: true
    optional: true
    prompt: Commit clarification changes?
    description: Auto-commit after spec clarification
    condition: null
  after_checklist:
  - extension: git
    command: speckit.git.commit
    enabled: true
    optional: true
    prompt: Commit checklist changes?
    description: Auto-commit after checklist generation
    condition: null
  after_analyze:
  - extension: git
    command: speckit.git.commit
    enabled: true
    optional: true
    prompt: Commit analysis results?
    description: Auto-commit after analysis
    condition: null
  after_taskstoissues:
  - extension: git
    command: speckit.git.commit
    enabled: true
    optional: true
    prompt: Commit after syncing issues?
    description: Auto-commit after tasks-to-issues conversion
    condition: null
