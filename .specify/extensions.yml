installed: []
settings:
  auto_execute_hooks: true
hooks:
  after_specify:
  - extension: red-team-review
    command: red-team-review
    enabled: true
    optional: false
    description: Challenge the specification with adversarial thinking to surface blind spots, wrong assumptions, and missing failure modes
    condition: null
  - extension: observability-contract
    command: observability-contract
    enabled: true
    optional: false
    description: Inspect, validate, and amend the specification to ensure complete decision-driven observability coverage across metrics, traces, and logs
    condition: null
  - extension: connector-coverage-check
    command: connector-coverage-check
    enabled: true
    optional: false
    description: Inspect, validate, and amend the specification to ensure full implementation coverage across all three connectors (Simulated, AzureDevOps, TFS)
    condition: null
  after_plan:
  - extension: plan-architecture-compliance
    command: plan-architecture-compliance
    enabled: true
    optional: false
    description: Design-time compliance review — validates spec.md and plan.md against all five architecture perspectives plus constitution and guardrails before task generation begins
    condition: null
  after_implement:
  - extension: test-validity
    command: test-validity
    enabled: true
    optional: false
    description: Score every test for intrinsic value and delete WASTE tests before promotion analysis
    condition: null
  - extension: test-promotion
    command: test-promotion
    enabled: true
    optional: false
    description: Analyse tests touched by implementation — promote to faster categories and retire redundant slower tests
    condition: null
  - extension: definition-of-done
    command: definition-of-done
    enabled: true
    optional: false
    description: Validate that the completed work meets every criterion in the Definition of Done — build, tests, code quality, connector coverage, documentation, and compliance review
    condition: null
  
