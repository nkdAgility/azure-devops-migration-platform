version: 1
seams:
  package:
    owner: "IPackageAccess"
    policy_layers:
      - "Module wrappers"
      - "Orchestrator sequencing"
    prohibited_parallel_entrypoints:
      - "Runtime package reads/writes over ad-hoc path logic"
  node_translation:
    owner: "INodeTranslationTool"
    policy_layers:
      - "WorkItems node policy adapters"
    prohibited_parallel_entrypoints:
      - "Custom translation engines in extensions"
  identity:
    owner: "IIdentityMappingService"
    policy_layers:
      - "Module-level mapping policy"
    prohibited_parallel_entrypoints:
      - "Manual identity matching logic in modules"
  field_transform:
    owner: "IFieldTransformTool"
    contract_doc: ".agents/10-contracts/specs/field-transform-contract.md"
    policy_layers:
      - "WorkItems field policy adapters"
    prohibited_parallel_entrypoints:
      - "Independent field transform pipelines"
  orchestration:
    owner: "I*Orchestrator abstractions"
    contract_doc: ".agents/10-contracts/specs/orchestrator-contract.md"
    policy_layers:
      - "Phase-specific orchestration wrappers"
      - "Module-specific orchestration adapters"
    prohibited_parallel_entrypoints:
      - "Duplicate orchestration pipelines for the same runtime concern"
      - "Bypass execution paths that skip canonical orchestrator contracts"
